version: "3.7"

x-ollama-env: &ollama_env
  TZ: ${TZ}

services:
  ollama:
    image: ollama/ollama:latest
    entrypoint: ["/bin/sh", "-lc"]
    command: |
      set -eu

      echo "== Ollama bootstrap starting =="

      ollama serve &
      OLLAMA_PID="$!"

      # Aguarda API local responder antes de tentar pull de modelos
      for i in $(seq 1 60); do
        if wget -qO- http://127.0.0.1:11434/api/tags >/dev/null 2>&1; then
          break
        fi
        sleep 2
      done

      # Pull opcional de modelos definidos no .env
      if [ -n "${OLLAMA_PULL_MODELS:-}" ]; then
        for model in ${OLLAMA_PULL_MODELS}; do
          echo "== Pulling model: ${model} =="
          ollama pull "${model}" || true
        done
      fi

      echo "== Ollama started =="
      wait "${OLLAMA_PID}"

    environment:
      <<: *ollama_env

    volumes:
      - ollama_data:/root/.ollama

    networks:
      - edge
      - data

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:11434/api/tags >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 40s

    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 10
      labels:
        - traefik.enable=true
        - traefik.docker.network=${EDGE_NETWORK}

        # DNS derivado: {TENANT}.ollama.{BASE_DOMAIN}
        - traefik.http.routers.ollama.rule=Host(`${DNS_PREFIX}.ollama.${BASE_DOMAIN}`)
        - traefik.http.routers.ollama.entrypoints=websecure
        - traefik.http.routers.ollama.tls.certresolver=letsencryptresolver

        - traefik.http.services.ollama.loadbalancer.server.port=11434

volumes:
  ollama_data:
    external: true
    name: "${STACK_PREFIX}_ollama_data"

networks:
  edge:
    external: true
    name: "${EDGE_NETWORK}"

  data:
    external: true
    name: "${DATA_NETWORK}"
